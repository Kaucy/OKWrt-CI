name: Build OK-Wrt

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 构建范围
        type: choice
        options: [all, smoke]
        default: all
      channel:
        description: 发布通道
        type: choice
        options: [all, lts, edge]
        default: all
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'config/**'
      - 'files/**'
      - 'scripts/**'
  schedule:
    # 每周一 03:00（中国时间）/ 04:00（日本时间）构建全部变种。
    - cron: '0 19 * * 0'

permissions:
  contents: write

concurrency:
  group: okwrt-${{ github.ref }}
  # 修复提交应立即替换已知失败的旧矩阵，避免继续消耗数小时 Runner。
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  OKWRT_IP: 192.168.66.1
  OKWRT_USER: root
  OKWRT_PASSWORD: password

jobs:
  matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.generate.outputs.builds }}
    steps:
      - uses: actions/checkout@v4
      - id: generate
        shell: bash
        env:
          REQUESTED_SCOPE: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[smoke]') && 'smoke' || inputs.scope || 'all' }}
          REQUESTED_CHANNEL: ${{ inputs.channel || 'all' }}
        run: |
          chmod +x scripts/*.sh
          builds="$(scripts/generate-matrix.sh "$REQUESTED_SCOPE" "$REQUESTED_CHANNEL")"
          echo "builds=$builds" >> "$GITHUB_OUTPUT"
          echo "$builds" | jq .

  build:
    name: ${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ matrix.feature }}-${{ matrix.chunk }}
    needs: matrix
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.matrix.outputs.builds) }}

    steps:
      - name: Checkout OK-Wrt CI
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget curl jq subversion patch libelf-dev device-tree-compiler \
            python3-pyelftools python3-ply ccache qemu-utils uglifyjs upx-ucl
          sudo mkdir -p /workdir
          sudo chown "$USER:$USER" /workdir
          chmod +x scripts/*.sh

      - name: Resolve source
        id: source
        shell: bash
        run: |
          scripts/select-source.sh \
            '${{ matrix.platform }}' '${{ matrix.edition }}' '${{ matrix.channel }}' \
            | tee /tmp/source.env
          cat /tmp/source.env >> "$GITHUB_OUTPUT"

      - name: Clone Fork and sync original upstream locally
        shell: bash
        env:
          FORK_REPO: ${{ steps.source.outputs.repo }}
          UPSTREAM_REPO: ${{ steps.source.outputs.upstream }}
          SOURCE_BRANCH: ${{ steps.source.outputs.branch }}
        run: |
          git clone --depth=1 --single-branch --branch "$SOURCE_BRANCH" "$FORK_REPO" /workdir/openwrt
          cd /workdir/openwrt
          fork_sha="$(git rev-parse HEAD)"
          git remote add canonical "$UPSTREAM_REPO"
          git fetch --depth=1 canonical "$SOURCE_BRANCH"
          git checkout --detach FETCH_HEAD
          upstream_sha="$(git rev-parse HEAD)"
          echo "FORK_SHA=$fork_sha" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHA=$upstream_sha" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "Fork:     $fork_sha"
          echo "Upstream: $upstream_sha"

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/openwrt/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/staging_dir/host*
            /workdir/openwrt/staging_dir/toolchain-*
            /workdir/openwrt/build_dir/host*
          key: okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ env.UPSTREAM_SHA }}
          restore-keys: |
            okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-

      - name: Update feeds
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install OK-Wrt packages
        run: scripts/install-packages.sh /workdir/openwrt '${{ matrix.feature }}'

      - name: Compose configuration and apply branding
        run: |
          scripts/compose-config.sh /workdir/openwrt \
            '${{ matrix.platform }}' '${{ matrix.target }}' '${{ matrix.subtarget }}' \
            '${{ matrix.edition }}' '${{ matrix.feature }}' '${{ matrix.devices }}' '${{ matrix.soc }}'
          scripts/apply-branding.sh /workdir/openwrt
          cd /workdir/openwrt
          make defconfig
          for device in ${{ matrix.devices }}; do
            if ! grep -Fq "_DEVICE_${device}=y" .config; then
              echo "Expected device profile was not selected: $device" >&2
              exit 1
            fi
          done
          cp .config "$GITHUB_WORKSPACE/okwrt.config"

      - name: Download sources
        working-directory: /workdir/openwrt
        run: |
          make download -j8
          find dl -type f -size -1024c -print -delete

      - name: Build firmware
        working-directory: /workdir/openwrt
        run: make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware
        shell: bash
        run: |
          set -euo pipefail
          variant="${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ matrix.feature }}-part${{ matrix.chunk }}"
          out="$GITHUB_WORKSPACE/upload/$variant"
          mkdir -p "$out"
          cp "$GITHUB_WORKSPACE/okwrt.config" "$out/config.txt"
          target_dir="/workdir/openwrt/bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          find "$target_dir" -maxdepth 1 -type f -exec cp {} "$out/" \;
          printf '%s\n' \
            "variant=$variant" \
            "fork_sha=$FORK_SHA" \
            "upstream_sha=$UPSTREAM_SHA" \
            "source_branch=$SOURCE_BRANCH" \
            "devices=${{ matrix.devices }}" \
            "management_ip=$OKWRT_IP" \
            "username=$OKWRT_USER" \
            "password=$OKWRT_PASSWORD" > "$out/build-metadata.txt"
          (cd "$out" && sha256sum -- * > SHA256SUMS)

      - name: Upload variant
        uses: actions/upload-artifact@v4
        with:
          name: okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ matrix.feature }}-part${{ matrix.chunk }}
          path: upload/
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish release
    needs: [matrix, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: okwrt-*
          merge-multiple: false
      - name: Prepare release files
        run: |
          chmod +x scripts/*.sh
          scripts/release-notes.sh release-notes.md
          find release-assets -type f -print0 | while IFS= read -r -d '' file; do
            dir="$(basename "$(dirname "$file")")"
            base="$(basename "$file")"
            mv "$file" "release-assets/${dir}--${base}"
          done
          find release-assets -mindepth 1 -type d -empty -delete
          (cd release-assets && sha256sum -- * > OKWRT-SHA256SUMS)
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: okwrt-${{ github.run_number }}-${{ github.run_attempt }}
          name: OK-Wrt Build ${{ github.run_number }}.${{ github.run_attempt }}
          body_path: release-notes.md
          files: release-assets/*
          prerelease: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
          make_latest: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
