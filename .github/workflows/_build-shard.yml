name: Reusable OK-Wrt Build Shard

on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
      edition:
        type: string
        required: true
      scope:
        type: string
        required: true
      channel:
        type: string
        required: true

permissions:
  contents: write
  actions: read

concurrency:
  group: okwrt-${{ inputs.platform }}-${{ inputs.edition }}-${{ inputs.scope }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  OKWRT_IP: 192.168.66.1
  OKWRT_USER: root

jobs:
  matrix:
    name: Generate ${{ inputs.platform }}-${{ inputs.edition }} matrix
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.generate.outputs.builds }}
    steps:
      - uses: actions/checkout@v4
      - id: generate
        shell: bash
        run: |
          chmod +x scripts/*.sh
          builds="$(scripts/generate-matrix.sh '${{ inputs.scope }}' '${{ inputs.channel }}' '${{ inputs.platform }}' '${{ inputs.edition }}')"
          test "$(jq '.include | length' <<< "$builds")" -gt 0
          echo "builds=$builds" >> "$GITHUB_OUTPUT"
          echo "$builds" | jq .

  build:
    name: ${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.channel }}-${{ matrix.soc }}-bundle-${{ matrix.chunk }}
    needs: matrix
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.matrix.outputs.builds) }}

    steps:
      - name: Checkout OK-Wrt CI
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev openssl python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget curl jq subversion patch libelf-dev device-tree-compiler \
            python3-pyelftools python3-ply ccache qemu-utils uglifyjs upx-ucl
          sudo mkdir -p /workdir
          sudo chown "$USER:$USER" /workdir
          chmod +x scripts/*.sh

      - name: Resolve source
        id: source
        shell: bash
        run: |
          scripts/select-source.sh \
            '${{ matrix.platform }}' '${{ matrix.edition }}' '${{ matrix.channel }}' \
            | tee /tmp/source.env
          cat /tmp/source.env >> "$GITHUB_OUTPUT"

      - name: Clone Fork and sync original upstream locally
        shell: bash
        env:
          FORK_REPO: ${{ steps.source.outputs.repo }}
          UPSTREAM_REPO: ${{ steps.source.outputs.upstream }}
          SOURCE_BRANCH: ${{ steps.source.outputs.branch }}
        run: |
          git clone --depth=1 --single-branch --branch "$SOURCE_BRANCH" "$FORK_REPO" /workdir/openwrt
          cd /workdir/openwrt
          fork_sha="$(git rev-parse HEAD)"
          git remote add canonical "$UPSTREAM_REPO"
          git fetch --depth=1 canonical "$SOURCE_BRANCH"
          git checkout --detach FETCH_HEAD
          upstream_sha="$(git rev-parse HEAD)"
          echo "FORK_SHA=$fork_sha" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHA=$upstream_sha" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "Fork:     $fork_sha"
          echo "Upstream: $upstream_sha"

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/openwrt/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/staging_dir/host*
            /workdir/openwrt/staging_dir/toolchain-*
            /workdir/openwrt/build_dir/host*
          key: okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ env.UPSTREAM_SHA }}
          restore-keys: |
            okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-

      - name: Update feeds
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build all eligible feature sets
        run: |
          scripts/build-feature-bundle.sh /workdir/openwrt \
            '${{ matrix.platform }}' '${{ matrix.target }}' '${{ matrix.subtarget }}' \
            '${{ matrix.edition }}' '${{ matrix.channel }}' '${{ matrix.devices }}' \
            '${{ matrix.soc }}' '${{ matrix.chunk }}'

      - name: Upload feature bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: okwrt-bundle-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ matrix.soc }}-part${{ matrix.chunk }}
          path: upload/
          retention-days: 14
          if-no-files-found: error

      - name: Verify bundle completeness
        if: ${{ always() }}
        run: |
          if [[ -s .build-failures ]]; then
            echo 'The following feature variants failed:' >&2
            cat .build-failures >&2
            exit 1
          fi

  release:
    name: Publish complete firmware catalog
    needs: [matrix, build]
    # Smoke and partial/failed matrices stay in Actions artifacts.  A public
    # Release must be a complete catalog so users never see a misleading
    # one-device or one-feature download page.
    if: ${{ always() && inputs.scope == 'all' && needs.matrix.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: okwrt-bundle-*
          merge-multiple: false
      - name: Prepare release files
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          chmod +x scripts/*.sh
          scripts/prepare-release-assets.sh release-assets publish
          test -n "$(find publish -mindepth 1 -type f -print -quit)" || {
            echo 'No publishable firmware was produced; skip Release creation.' >&2
            exit 0
          }
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM: ${{ inputs.platform }}
          EDITION: ${{ inputs.edition }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          case "$PLATFORM" in
            qcom) platform_title='Qualcomm' ;;
            mtk) platform_title='MediaTek' ;;
            *) echo "Unknown platform: $PLATFORM" >&2; exit 1 ;;
          esac
          case "$EDITION" in
            open) edition_title='Open' ;;
            pro) edition_title='Pro' ;;
            *) echo "Unknown edition: $EDITION" >&2; exit 1 ;;
          esac

          shopt -s nullglob
          for channel_dir in publish/*; do
            [[ -d "$channel_dir" ]] || continue
            channel="$(basename "$channel_dir")"
            channel_title="${channel^^}"
            for family_dir in "$channel_dir"/*; do
              [[ -d "$family_dir" ]] || continue
              family="$(basename "$family_dir")"
              case "$family" in
                ipq50xx) family_title='IPQ50xx' ;;
                ipq60xx) family_title='IPQ60xx' ;;
                ipq807x) family_title='IPQ807x / IPQ817x' ;;
                ipq95xx) family_title='IPQ95xx' ;;
                filogic) family_title='Filogic / MT798x' ;;
                *) echo "Unknown device family: $family" >&2; exit 1 ;;
              esac

              tag="okwrt-$PLATFORM-$EDITION-$family-$channel"
              title="OK-Wrt $platform_title $edition_title · $family_title · $channel_title"
              notes="release-notes-$PLATFORM-$EDITION-$family-$channel.md"
              scripts/release-notes.sh "$notes"
              printf '\n## 本 Release 分类\n\n- 平台：`%s`\n- 产品线：`%s`\n- 芯片族：`%s`\n- 通道：`%s`\n- 完整构建：`%s`\n- 源提交：`%s`\n' \
                "$platform_title" "$edition_title" "$family_title" "$channel_title" \
                "$BUILD_RESULT" "$GITHUB_SHA" >> "$notes"

              if ! gh release view "$tag" >/dev/null 2>&1; then
                gh release create "$tag" --target "$GITHUB_SHA" \
                  --title "$title" --notes-file "$notes" --latest=false
              fi
              gh release upload "$tag" "$family_dir"/* --clobber
              gh release edit "$tag" --title "$title" --notes-file "$notes"
            done
          done
