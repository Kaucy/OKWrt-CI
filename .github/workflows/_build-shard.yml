name: Reusable OK-Wrt Build Shard

on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
      edition:
        type: string
        required: true
      scope:
        type: string
        required: true
      channel:
        type: string
        required: true

permissions:
  contents: write
  actions: read

concurrency:
  group: okwrt-${{ inputs.platform }}-${{ inputs.edition }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  OKWRT_IP: 192.168.66.1
  OKWRT_USER: root

jobs:
  matrix:
    name: Generate ${{ inputs.platform }}-${{ inputs.edition }} matrix
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.generate.outputs.builds }}
    steps:
      - uses: actions/checkout@v4
      - id: generate
        shell: bash
        run: |
          chmod +x scripts/*.sh
          builds="$(scripts/generate-matrix.sh '${{ inputs.scope }}' '${{ inputs.channel }}' '${{ inputs.platform }}' '${{ inputs.edition }}')"
          test "$(jq '.include | length' <<< "$builds")" -gt 0
          echo "builds=$builds" >> "$GITHUB_OUTPUT"
          echo "$builds" | jq .

  build:
    name: ${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.channel }}-${{ matrix.soc }}-bundle-${{ matrix.chunk }}
    needs: matrix
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.matrix.outputs.builds) }}

    steps:
      - name: Checkout OK-Wrt CI
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget curl jq subversion patch libelf-dev device-tree-compiler \
            python3-pyelftools python3-ply ccache qemu-utils uglifyjs upx-ucl
          sudo mkdir -p /workdir
          sudo chown "$USER:$USER" /workdir
          chmod +x scripts/*.sh

      - name: Resolve source
        id: source
        shell: bash
        run: |
          scripts/select-source.sh \
            '${{ matrix.platform }}' '${{ matrix.edition }}' '${{ matrix.channel }}' \
            | tee /tmp/source.env
          cat /tmp/source.env >> "$GITHUB_OUTPUT"

      - name: Clone Fork and sync original upstream locally
        shell: bash
        env:
          FORK_REPO: ${{ steps.source.outputs.repo }}
          UPSTREAM_REPO: ${{ steps.source.outputs.upstream }}
          SOURCE_BRANCH: ${{ steps.source.outputs.branch }}
        run: |
          git clone --depth=1 --single-branch --branch "$SOURCE_BRANCH" "$FORK_REPO" /workdir/openwrt
          cd /workdir/openwrt
          fork_sha="$(git rev-parse HEAD)"
          git remote add canonical "$UPSTREAM_REPO"
          git fetch --depth=1 canonical "$SOURCE_BRANCH"
          git checkout --detach FETCH_HEAD
          upstream_sha="$(git rev-parse HEAD)"
          echo "FORK_SHA=$fork_sha" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHA=$upstream_sha" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "Fork:     $fork_sha"
          echo "Upstream: $upstream_sha"

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/openwrt/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/staging_dir/host*
            /workdir/openwrt/staging_dir/toolchain-*
            /workdir/openwrt/build_dir/host*
          key: okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ env.UPSTREAM_SHA }}
          restore-keys: |
            okwrt-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-

      - name: Update feeds
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build all eligible feature sets
        run: |
          scripts/build-feature-bundle.sh /workdir/openwrt \
            '${{ matrix.platform }}' '${{ matrix.target }}' '${{ matrix.subtarget }}' \
            '${{ matrix.edition }}' '${{ matrix.channel }}' '${{ matrix.devices }}' \
            '${{ matrix.soc }}' '${{ matrix.chunk }}'

      - name: Upload feature bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: okwrt-bundle-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.edition }}-${{ matrix.channel }}-${{ matrix.soc }}-part${{ matrix.chunk }}
          path: upload/
          retention-days: 14
          if-no-files-found: error

      - name: Verify bundle completeness
        if: ${{ always() }}
        run: |
          if [[ -s .build-failures ]]; then
            echo 'The following feature variants failed:' >&2
            cat .build-failures >&2
            exit 1
          fi

  release:
    name: Publish available firmware
    needs: [matrix, build]
    if: ${{ always() && needs.matrix.result == 'success' && needs.build.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: okwrt-bundle-*
          merge-multiple: false
      - name: Prepare release files
        env:
          SHARD: ${{ inputs.platform }}-${{ inputs.edition }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          chmod +x scripts/*.sh
          scripts/release-notes.sh release-notes.md
          printf '\n## 本次构建状态\n\n- 当前分片：`%s`\n- 构建结果：`%s`\n- 四个分片会逐步汇总到同一个 Release。\n' \
            "$SHARD" "$BUILD_RESULT" >> release-notes.md
          find release-assets -type f -print0 | while IFS= read -r -d '' file; do
            dir="$(basename "$(dirname "$file")")"
            base="$(basename "$file")"
            mv "$file" "release-assets/okwrt-${dir}--${base}"
          done
          find release-assets -mindepth 1 -type d -empty -delete
          (cd release-assets && sha256sum -- * > "OKWRT-$SHARD-SHA256SUMS")
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: okwrt-${{ github.sha }}
        run: |
          # 四个分片可能同时首次创建同一 Release；失败的一方等待另一方创建完成。
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --target "$GITHUB_SHA" \
              --title "OK-Wrt $GITHUB_SHA" --notes-file release-notes.md --latest || true
          fi
          for attempt in 1 2 3 4 5; do
            gh release view "$TAG" >/dev/null 2>&1 && break
            sleep 5
          done
          gh release view "$TAG" >/dev/null
          gh release upload "$TAG" release-assets/* --clobber
          gh release edit "$TAG" --title "OK-Wrt $GITHUB_SHA" \
            --notes-file release-notes.md --latest
