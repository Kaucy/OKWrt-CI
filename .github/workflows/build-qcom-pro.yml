name: Build Qualcomm Pro

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 构建范围
        type: choice
        options: [all, smoke]
        default: all
      channel:
        description: 发布通道
        type: choice
        options: [all, lts, edge]
        default: all
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'config/**'
      - 'files/**'
      - 'scripts/**'
  schedule:
    - cron: '15 19 * * 0'

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/_build-shard.yml
    with:
      platform: qcom
      edition: pro
      scope: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[smoke]') && 'smoke' || inputs.scope || 'all' }}
      channel: ${{ inputs.channel || 'all' }}
    secrets: inherit
